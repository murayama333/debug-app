<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>メッセージ一覧</title>
</head>
<body>
	<h1>メッセージ一覧</h1>

	<form th:action="@{/messages}" th:object="${messageForm}" method="post">
		<input type="text" th:field="*{content}" placeholder="メッセージを入力">
		<span th:if="${#fields.hasErrors('content')}" th:errors="*{content}" style="color: red;"></span>
		<button type="button">登録</button>
	</form>

	<ul>
		<li th:each="message : ${messages}">
			<span th:text="${message.content}"></span>
			(<span th:text="${message.createdAt}"></span>)
		</li>
	</ul>
</body>
</html>
